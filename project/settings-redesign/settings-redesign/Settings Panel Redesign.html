// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="env,react">
// Shared form-control primitives for the MeshCore settings panel mock.
// Pure-visual — no real state. Pass `value`/`checked` to render; `disabled`
// to gray-out (used by the no-radio banner state).
//
// All controls accept a `t` theme prop so the same component renders in
// light & dark side-by-side without a CSS variable round-trip.

const { useState } = React;

// ─── Toggle ──────────────────────────────────────────────────────────
function Toggle({ checked, disabled, t, size = 'md' }) {
  const w = size === 'sm' ? 28 : 32;
  const h = size === 'sm' ? 16 : 18;
  const k = size === 'sm' ? 12 : 14;
  return (
    <span
      role="switch"
      aria-checked={checked}
      style={{
        display: 'inline-block',
        width: w,
        height: h,
        borderRadius: h,
        background: checked ? t.accent : t.bg3,
        border: `1px solid ${checked ? t.accent : t.border}`,
        position: 'relative',
        transition: 'background 0.15s, border-color 0.15s',
        opacity: disabled ? 0.5 : 1,
        cursor: disabled ? 'not-allowed' : 'pointer',
        flexShrink: 0,
        verticalAlign: 'middle',
      }}>
      <span style={{
        position: 'absolute',
        top: 1,
        left: checked ? w - k - 3 : 2,
        width: k,
        height: k,
        borderRadius: '50%',
        background: t.mode === 'dark' && !checked ? t.text : '#fff',
        boxShadow: '0 1px 2px rgba(0,0,0,0.25)',
        transition: 'left 0.15s',
      }}/>
    </span>
  );
}

// ─── Select ──────────────────────────────────────────────────────────
function Select({ value, options, disabled, t, mono, width = 220 }) {
  const opt = options.find(o => o.value === value) || options[0];
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      gap: 6,
      padding: '5px 8px 5px 10px',
      width,
      background: t.controlBg,
      border: `1px solid ${t.controlBorder}`,
      borderRadius: 5,
      color: disabled ? t.textDim : t.text,
      fontSize: 12.5,
      fontFamily: mono ? window.MC_MONO : 'inherit',
      opacity: disabled ? 0.6 : 1,
      cursor: disabled ? 'not-allowed' : 'pointer',
      justifyContent: 'space-between',
    }}>
      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
        {opt.label}
      </span>
      <svg width="9" height="9" viewBox="0 0 11 11" fill="none" stroke="currentColor"
        strokeWidth="1.6" strokeLinecap="round" style={{ opacity: 0.55, flexShrink: 0 }}>
        <path d="M2 4l3.5 3.5L9 4"/>
      </svg>
    </span>
  );
}

// ─── NumberInput ─────────────────────────────────────────────────────
function NumberInput({ value, suffix, disabled, t, width = 88 }) {
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      width,
      background: t.controlBg,
      border: `1px solid ${t.controlBorder}`,
      borderRadius: 5,
      color: disabled ? t.textDim : t.text,
      fontSize: 12.5,
      fontFamily: window.MC_MONO,
      opacity: disabled ? 0.6 : 1,
      cursor: disabled ? 'not-allowed' : 'text',
      overflow: 'hidden',
    }}>
      <span style={{ padding: '5px 8px', flex: 1, textAlign: 'right' }}>{value}</span>
      {suffix && (
        <span style={{
          fontFamily: window.MC_MONO,
          fontSize: 11,
          color: t.textDim,
          padding: '5px 8px',
          borderLeft: `1px solid ${t.border}`,
          background: t.bg2,
        }}>{suffix}</span>
      )}
    </span>
  );
}

// ─── TextInput ───────────────────────────────────────────────────────
function TextInput({ value, placeholder, disabled, t, mono, width = 280 }) {
  return (
    <span style={{
      display: 'inline-block',
      width,
      padding: '5px 8px',
      background: t.controlBg,
      border: `1px solid ${t.controlBorder}`,
      borderRadius: 5,
      color: disabled ? t.textDim : t.text,
      fontSize: 12.5,
      fontFamily: mono ? window.MC_MONO : 'inherit',
      opacity: disabled ? 0.6 : 1,
      cursor: disabled ? 'not-allowed' : 'text',
      whiteSpace: 'nowrap',
      overflow: 'hidden',
      textOverflow: 'ellipsis',
    }}>
      {value || <span style={{ color: t.textDim }}>{placeholder}</span>}
    </span>
  );
}

// ─── Button ──────────────────────────────────────────────────────────
function Button({ kind = 'secondary', size = 'md', disabled, t, children, leadingIcon }) {
  const sizes = {
    sm: { pad: '3px 8px', fs: 11.5 },
    md: { pad: '5px 12px', fs: 12.5 },
  };
  const sz = sizes[size];
  let bg, fg, border;
  if (kind === 'primary') {
    bg = t.accent; fg = t.mode === 'dark' ? '#1c1810' : '#fff'; border = t.accent;
  } else if (kind === 'ghost') {
    bg = 'transparent'; fg = t.text; border = 'transparent';
  } else if (kind === 'danger') {
    bg = 'transparent'; fg = t.danger; border = t.border;
  } else {
    bg = t.bg2; fg = t.text; border = t.border;
  }
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      gap: 5,
      padding: sz.pad,
      fontSize: sz.fs,
      fontWeight: kind === 'primary' ? 600 : 500,
      background: bg,
      color: fg,
      border: `1px solid ${border}`,
      borderRadius: 5,
      cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled ? 0.5 : 1,
      whiteSpace: 'nowrap',
      lineHeight: 1.2,
    }}>
      {leadingIcon}
      {children}
    </span>
  );
}

// ─── DirtyBadge ─────────────────────────────────────────────────────
function DirtyBadge({ t, label = 'Unsaved' }) {
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      gap: 5,
      padding: '2px 7px',
      fontSize: 10.5,
      fontFamily: window.MC_MONO,
      letterSpacing: 0.3,
      color: t.warn,
      background: t.accentBg,
      border: `1px solid ${t.bannerBorder}`,
      borderRadius: 3,
      textTransform: 'uppercase',
    }}>
      <span style={{
        width: 5, height: 5, borderRadius: '50%',
        background: t.warn, display: 'inline-block',
      }}/>
      {label}
    </span>
  );
}

// ─── Banner (disconnected, etc.) ────────────────────────────────────
function Banner({ t, icon, title, body, action }) {
  return (
    <div style={{
      display: 'flex',
      gap: 12,
      alignItems: 'flex-start',
      padding: '12px 14px',
      background: t.bannerBg,
      border: `1px solid ${t.bannerBorder}`,
      borderRadius: 6,
      fontFamily: window.MC_FONT,
    }}>
      {icon && <div style={{ color: t.warn, flexShrink: 0, marginTop: 1 }}>{icon}</div>}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: t.text, marginBottom: 2 }}>{title}</div>
        {body && <div style={{ fontSize: 12, color: t.textMuted, lineHeight: 1.45 }}>{body}</div>}
      </div>
      {action && <div style={{ flexShrink: 0 }}>{action}</div>}
    </div>
  );
}

// ─── PillTabs (segmented) ───────────────────────────────────────────
function PillTabs({ tabs, active, t }) {
  return (
    <div role="tablist" style={{
      display: 'inline-flex',
      padding: 3,
      background: t.bg3,
      border: `1px solid ${t.border}`,
      borderRadius: 7,
      gap: 2,
    }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        return (
          <span key={tab.id} role="tab" aria-selected={on} style={{
            display: 'inline-flex',
            alignItems: 'center',
            gap: 7,
            padding: '5px 14px',
            fontSize: 12.5,
            fontWeight: on ? 600 : 500,
            color: on ? (t.mode === 'dark' ? '#1c1810' : '#fff') : t.textMuted,
            background: on ? t.accent : 'transparent',
            borderRadius: 5,
            cursor: 'pointer',
            transition: 'background 0.12s',
            whiteSpace: 'nowrap',
          }}>
            {tab.icon}
            {tab.label}
          </span>
        );
      })}
    </div>
  );
}

Object.assign(window, {
  Toggle, Select, NumberInput, TextInput, Button, DirtyBadge, Banner, PillTabs,
});

</script>

<script type="text/babel" data-presets="env,react">
// SettingsPanel — the redesigned MeshCore settings surface.
//
//   <SettingsPanel theme={t} tab="app"|"radio" connected={true|false} />
//
// Layout:
//   ┌───────────────────────────────────────────────────────────┐
//   │  Settings                                  · status pill   │
//   │  [ Application Settings ] [ Radio Settings ]               │
//   ├───────────────────────────────────────────────────────────┤
//   │                                            │ ON THIS PAGE  │
//   │  ── Section ──────────────────────────     │  Appearance   │
//   │  ┌─ icon · Title ─────────[Unsaved][Save]  │  Composer     │
//   │  │  Row label                  [control]   │  Notifications│
//   │  │  Row label · description    [control]   │  …            │
//   │                                            │               │
//   └───────────────────────────────────────────────────────────┘
//
// Per-section Save: each section in MC_SETTINGS may carry a `dirty` flag.
// When true the Save button is shown in its primary/accent treatment with
// a small "Unsaved" badge next to the section title. When false the button
// is rendered in its ghost/resting treatment, disabled — so the affordance
// is always visible but only actionable when there's something to save.
//
// Radio tab + connected=false: top of the panel shows a banner with a
// Connect CTA; every row is rendered with `disabled` to dim the control
// and suppress interaction.

// ─── Icon set (12–14px stroked) ──────────────────────────────────────
function Icon({ name, size = 14, t }) {
  const props = {
    width: size, height: size, viewBox: '0 0 16 16',
    fill: 'none', stroke: 'currentColor', strokeWidth: 1.5,
    strokeLinecap: 'round', strokeLinejoin: 'round',
  };
  switch (name) {
    case 'sun':     return <svg {...props}><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M3 13l1.5-1.5M11.5 4.5L13 3"/></svg>;
    case 'send':    return <svg {...props}><path d="M2 8l11-5-4 11-2-5z"/></svg>;
    case 'bell':    return <svg {...props}><path d="M4 11v-4a4 4 0 1 1 8 0v4M2.5 11h11M7 13a1 1 0 0 0 2 0"/></svg>;
    case 'wifi':    return <svg {...props}><path d="M1.5 6.5C4 4 7 3 8 3s4 1 6.5 3.5M3.5 9C5 7.5 7 7 8 7s3 .5 4.5 2"/><circle cx="8" cy="12" r="0.7" fill="currentColor" stroke="none"/></svg>;
    case 'sliders': return <svg {...props}><path d="M2 4h12M2 8h12M2 12h12"/><circle cx="5" cy="4" r="1.2" fill={t?.bg || '#fff'}/><circle cx="10" cy="8" r="1.2" fill={t?.bg || '#fff'}/><circle cx="6" cy="12" r="1.2" fill={t?.bg || '#fff'}/></svg>;
    case 'map':     return <svg {...props}><path d="M2 4l4-1 4 1 4-1v10l-4 1-4-1-4 1z"/><path d="M6 3v11M10 4v11"/></svg>;
    case 'user':    return <svg {...props}><circle cx="8" cy="6" r="2.5"/><path d="M3 14c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg>;
    case 'radio':   return <svg {...props}><circle cx="8" cy="8" r="1.5"/><path d="M5 5C3 6 3 10 5 11M11 5c2 1 2 5 0 6M3.5 3.5C1 5 1 11 3.5 12.5M12.5 3.5C15 5 15 11 12.5 12.5"/></svg>;
    case 'key':     return <svg {...props}><circle cx="5" cy="11" r="2.5"/><path d="M7 9l6-6M11 5l1.5 1.5M13 3l1.5 1.5"/></svg>;
    case 'bt':      return <svg {...props}><path d="M5 4l6 8-3 2V2l3 2-6 8"/></svg>;
    case 'contact': return <svg {...props}><rect x="2" y="3" width="12" height="10" rx="1.5"/><circle cx="6.5" cy="7.5" r="1.5"/><path d="M4 11.5c0-1 1-2 2.5-2s2.5 1 2.5 2M10 6h2.5M10 9h2"/></svg>;
    case 'info':    return <svg {...props}><circle cx="8" cy="8" r="6.5"/><path d="M8 7v4M8 5v.5"/></svg>;
    case 'plug':    return <svg {...props}><path d="M6 2v3M10 2v3M4 5h8v3a4 4 0 0 1-8 0z M8 12v2.5"/></svg>;
    case 'cog':     return <svg {...props}><circle cx="8" cy="8" r="2"/><path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4"/></svg>;
    default: return <span style={{ width: size, height: size, display: 'inline-block' }}/>;
  }
}

// ─── One row: label + optional description + warning + control ──────
function SettingsRow({ row, t, disabled }) {
  const c = row.ctrl;
  const ctrlDisabled = disabled || c.disabled;
  let control;
  switch (c.kind) {
    case 'toggle': control = <Toggle checked={c.value} disabled={ctrlDisabled} t={t} />; break;
    case 'select': control = <Select value={c.value} options={c.options} width={c.width} disabled={ctrlDisabled} t={t} />; break;
    case 'number': control = <NumberInput value={c.value} suffix={c.suffix} width={c.width} disabled={ctrlDisabled} t={t} />; break;
    case 'text':   control = <TextInput value={c.value} mono={c.mono} width={c.width} disabled={ctrlDisabled} t={t} />; break;
    case 'button': control = <Button kind={c.danger ? 'danger' : 'secondary'} disabled={ctrlDisabled} t={t}>{c.label}</Button>; break;
    default: control = null;
  }

  return (
    <div style={{
      display: 'flex',
      alignItems: 'flex-start',
      gap: 16,
      padding: '12px 0',
      opacity: disabled ? 0.55 : 1,
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 500, color: t.text, lineHeight: 1.35 }}>
          {row.label}
        </div>
        {row.desc && (
          <div style={{
            fontSize: 11.5, color: t.textDim, lineHeight: 1.4,
            marginTop: 2, maxWidth: 360,
          }}>{row.desc}</div>
        )}
        {row.warning && (
          <div style={{
            fontSize: 11, color: t.warn, marginTop: 4,
            display: 'flex', alignItems: 'center', gap: 4,
          }}>
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor"
              strokeWidth="1.6" strokeLinecap="round">
              <path d="M8 2L1.5 13h13z M8 6v3M8 11v.5"/>
            </svg>
            {row.warning}
          </div>
        )}
      </div>
      <div style={{ flexShrink: 0, paddingTop: 1 }}>{control}</div>
    </div>
  );
}

// ─── One section: header (icon + title + dirty/Save) + rows + footnote
function SettingsSection({ section, t, disabled, isFirst }) {
  return (
    <section data-section={section.id} style={{ scrollMarginTop: 16 }}>
      {!isFirst && <div style={{ height: 1, background: t.border, margin: '20px 0 18px' }}/>}
      <header style={{
        display: 'flex', alignItems: 'flex-start', gap: 12,
        marginBottom: section.description ? 4 : 12,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <h2 style={{
            margin: 0, fontSize: 15, fontWeight: 600,
            color: t.text, letterSpacing: -0.1,
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <span style={{ color: t.accent, display: 'inline-flex' }}>
              <Icon name={section.icon} size={14} t={t}/>
            </span>
            {section.title}
          </h2>
          {section.description && (
            <p style={{
              margin: '4px 0 0', fontSize: 12, color: t.textMuted,
              lineHeight: 1.45, maxWidth: 460,
            }}>{section.description}</p>
          )}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          {section.dirty && <DirtyBadge t={t}/>}
          <Button
            kind={section.dirty ? 'primary' : 'ghost'}
            size="sm"
            disabled={disabled || !section.dirty}
            t={t}>Save</Button>
        </div>
      </header>
      <div style={{ marginTop: 6 }}>
        {section.rows.map((row, i) => (
          <div key={i} style={{ borderTop: i ? `1px solid ${t.border}` : 'none' }}>
            <SettingsRow row={row} t={t} disabled={disabled}/>
          </div>
        ))}
      </div>
      {section.footnote && (
        <p style={{ margin: '8px 0 0', fontSize: 11, fontStyle: 'italic', color: t.textDim }}>
          {section.footnote}
        </p>
      )}
    </section>
  );
}

// ─── Right rail: "ON THIS PAGE" jump list with active marker ────────
function JumpRail({ sections, t, active }) {
  return (
    <nav aria-label="Jump to section" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
      <div style={{
        fontFamily: window.MC_MONO, fontSize: 9.5, color: t.textDim,
        letterSpacing: 0.6, padding: '0 0 8px',
      }}>ON THIS PAGE</div>
      {sections.map(s => {
        const on = s.id === active;
        return (
          <span key={s.id} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '4px 0 4px 10px',
            borderLeft: `2px solid ${on ? t.accent : 'transparent'}`,
            fontSize: 12,
            fontWeight: on ? 600 : 400,
            color: on ? t.text : t.textMuted,
            cursor: 'pointer',
          }}>
            {s.title}
            {s.dirty && (
              <span style={{
                width: 5, height: 5, borderRadius: '50%',
                background: t.warn, display: 'inline-block',
              }}/>
            )}
          </span>
        );
      })}
    </nav>
  );
}

// ─── Main shell ──────────────────────────────────────────────────────
function SettingsPanel({ theme, tab = 'app', connected = true }) {
  const t = theme;
  const sections = window.MC_SETTINGS[tab];
  // First section is "in view" — drives the rail highlight.
  const activeSec = sections[0].id;
  const disabled = tab === 'radio' && !connected;

  return (
    <div style={{
      width: '100%', height: '100%',
      background: t.bg, color: t.text,
      fontFamily: window.MC_FONT,
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      {/* Header: title + segmented tabs + status pill */}
      <div style={{
        flexShrink: 0,
        padding: '20px 28px 14px',
        borderBottom: `1px solid ${t.border}`,
        background: t.bg,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 14 }}>
          <h1 style={{
            margin: 0, fontSize: 17, fontWeight: 700,
            color: t.text, letterSpacing: -0.2,
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <span style={{ color: t.accent }}><Icon name="cog" size={16} t={t}/></span>
            Settings
          </h1>
          <div style={{ flex: 1 }}/>
        </div>
        <div style={{
          display: 'flex', alignItems: 'center',
          justifyContent: 'space-between', gap: 16,
        }}>
          <PillTabs
            tabs={[
              { id: 'app',   label: 'Application Settings', icon: <Icon name="cog" size={12} t={t}/> },
              { id: 'radio', label: 'Radio Settings',       icon: <Icon name="radio" size={12} t={t}/> },
            ]}
            active={tab}
            t={t}
          />
          <span style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            fontSize: 11.5, color: t.textMuted,
          }}>
            <span style={{
              width: 7, height: 7, borderRadius: '50%',
              background: connected ? t.online : t.textDim,
              boxShadow: connected ? `0 0 0 3px ${t.accentBg}` : 'none',
            }}/>
            {tab === 'radio'
              ? (connected ? 'egrme.sh Hand · USB' : 'No radio connected')
              : 'Local · auto-saved'}
          </span>
        </div>
      </div>

      {/* Body: scrolling content + sticky right rail */}
      <div style={{
        flex: 1, minHeight: 0, display: 'flex',
        overflow: 'hidden',
      }}>
        <div style={{
          flex: 1, minWidth: 0, overflow: 'auto',
          padding: '20px 28px 28px',
        }}>
          {disabled && (
            <div style={{ marginBottom: 16 }}>
              <Banner
                t={t}
                icon={
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                    strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M8 2L1.5 13h13z M8 6v4M8 12v.5"/>
                  </svg>
                }
                title="No radio connected"
                body="These settings are stored on the radio. Connect a device to view and edit live values."
                action={
                  <Button kind="primary" size="md" t={t}
                    leadingIcon={<Icon name="plug" size={12} t={t}/>}>
                    Connect radio…
                  </Button>
                }
              />
            </div>
          )}
          {sections.map((s, i) => (
            <SettingsSection
              key={s.id}
              section={s}
              t={t}
              disabled={disabled}
              isFirst={i === 0}
            />
          ))}
        </div>
        <aside style={{
          width: 188,
          flexShrink: 0,
          padding: '20px 24px 28px 4px',
          borderLeft: `1px solid ${t.border}`,
          background: t.bg,
          overflow: 'auto',
        }}>
          <JumpRail sections={sections} t={t} active={activeSec}/>
        </aside>
      </div>
    </div>
  );
}

window.SettingsPanel = SettingsPanel;

</script>

<script type="text/babel" data-presets="env,react">
// Mounts the SettingsPanel mock inside DesignCanvas. Application + Radio
// tabs, each in light + dark, plus a Radio tab no-connected pair.

const ARTBOARD_W = 820;
const ARTBOARD_H = 900;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "amber",
  "showDisconnected": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accent;
  const light = window.MC_PALETTE.make('light', accent);
  const dark  = window.MC_PALETTE.make('dark',  accent);
  const themes = { light, dark };

  const card = (tab, connected, mode) => {
    const tag = `${tab}-${mode}${connected ? '' : '-off'}`;
    const label = `${mode === 'light' ? 'Light' : 'Dark'}${connected ? '' : ' · disconnected'}`;
    return (
      <DCArtboard key={tag} id={tag} label={label} width={ARTBOARD_W} height={ARTBOARD_H}>
        <SettingsPanel theme={themes[mode]} tab={tab} connected={connected}/>
      </DCArtboard>
    );
  };

  return (
    <React.Fragment>
      <DesignCanvas>
        <DCSection
          id="app-settings"
          title="Application Settings"
          subtitle="Local preferences · auto-saved. Pill tabs, sticky right rail, per-section Save.">
          {card('app', true, 'light')}
          {card('app', true, 'dark')}
        </DCSection>

        <DCSection
          id="radio-settings"
          title="Radio Settings"
          subtitle="Stored on the radio. Same layout, per-section Save buttons commit to the device.">
          {card('radio', true, 'light')}
          {card('radio', true, 'dark')}
        </DCSection>

        {tweaks.showDisconnected && (
          <DCSection
            id="radio-disconnected"
            title="Radio Settings · No radio connected"
            subtitle="Controls remain visible but disabled; a banner offers a Connect CTA.">
            {card('radio', false, 'light')}
            {card('radio', false, 'dark')}
          </DCSection>
        )}
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent">
          <AccentSwatchPicker
            value={accent}
            options={Object.entries(window.MC_PALETTE.accentSwatches).map(([key, s]) => ({
              value: key, color: s.light, name: s.name,
            }))}
            onChange={(v) => setTweak('accent', v)}
          />
          <div style={{ fontSize: 11, color: '#a39884', lineHeight: 1.45, marginTop: 4 }}>
            Light-mode hue shown. Dark mode shifts one stop brighter automatically.
          </div>
        </TweakSection>
        <TweakSection title="Sections">
          <TweakToggle
            label="Show no-radio state"
            value={tweaks.showDisconnected}
            onChange={(v) => setTweak('showDisconnected', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

// Named accent swatches. tweaks-panel.jsx's TweakColor takes a flat list of
// hex strings — we want named tokens so we render our own.
function AccentSwatchPicker({ value, options, onChange }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{
        fontSize: 11, fontWeight: 500,
        color: 'var(--tweaks-label, #a39884)',
        textTransform: 'uppercase', letterSpacing: 0.4,
      }}>Accent swatch</div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {options.map(opt => {
          const on = opt.value === value;
          return (
            <button
              key={opt.value}
              onClick={() => onChange(opt.value)}
              title={opt.name}
              style={{
                width: 32, height: 32, padding: 0,
                borderRadius: 6,
                background: opt.color,
                border: on ? '2px solid #fafafa' : '2px solid transparent',
                cursor: 'pointer',
                boxShadow: on ? '0 0 0 1px rgba(0,0,0,0.4)' : 'none',
              }}
            />
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
