name: CI

on:
  push:
    branches: [main] # nightly → build artifacts only
    tags: ['v*.*.*'] # release → draft GitHub release
  pull_request: # test + build every PR
  workflow_dispatch: # manual

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # never cancel an in-flight tag/release build; do cancel superseded PR/main runs
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  NODE_VERSION: '24.15.0'
  PNPM_VERSION: '11'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm test:integration
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install native build + headless Electron deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev xvfb
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Electron/Chromium shared libraries
        run: pnpm exec playwright install-deps
      - run: pnpm package
      - run: xvfb-run --auto-servernum pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build (${{ matrix.platform }})
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            make: pnpm make:mac
          - os: windows-latest
            platform: win32
            make: pnpm make:win
          - os: ubuntu-latest
            platform: linux
            make: pnpm make
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev rpm fakeroot
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # macOS code signing + notarization setup (cert import + notary key).
      - name: Set up macOS signing
        if: matrix.platform == 'darwin'
        uses: ./.github/actions/setup-macos-signing
        with:
          certificate: ${{ secrets.MACOS_CERTIFICATE }}
          certificate-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          api-key: ${{ secrets.APPLE_API_KEY }}

      # Windows Azure Trusted Signing setup (dlib + metadata + signtool).
      - name: Set up Windows signing
        if: matrix.platform == 'win32'
        uses: ./.github/actions/setup-windows-signing
        with:
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          account: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          certificate-profile: ${{ secrets.AZURE_CERT_PROFILE }}

      - name: Make
        env:
          # Renderer commercial license for @virtuoso.dev/message-list, embedded
          # by Vite at build time (VITE_-prefixed env). Without it the packaged
          # app shows a "license key is missing" warning instead of messages.
          VITE_VIRTUOSO_LICENSE_KEY: ${{ secrets.VITE_VIRTUOSO_LICENSE_KEY }}
          # macOS signing + notarization (read by forge.config.ts)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Windows Trusted Signing auth (read by the signtool dlib)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: ${{ matrix.make }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coresense-${{ matrix.platform }}
          path: out/make/**
          if-no-files-found: error

  release:
    name: Draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          # Only the per-platform build outputs — NOT the coverage or
          # playwright-report artifacts that other jobs upload to the same run.
          pattern: coresense-*
          path: dist-artifacts
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          # Every maker output across the three coresense-<platform> artifacts.
          # Includes the auto-update set (RELEASES, *.nupkg, *Setup.exe, *.zip).
          files: dist-artifacts/coresense-*/**/*
          fail_on_unmatched_files: true
