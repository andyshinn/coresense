name: Homebrew cask

# Keep Casks/coresense.rb and Casks/coresense@dev.rb (version + sha256) in sync
# with releases. `published` fires for every release publish — stable AND
# prerelease — and, unlike `released`/`prereleased`, it also fires when a release
# is published from a draft (ci.yml drafts stable releases for manual publish).
# It's post-publish, so the download URL resolves and the sha256 matches the
# final bytes — no draft-release race.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: homebrew-cask
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main # commit the bump onto the branch head, not the tagged commit

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Select target cask
        env:
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            echo "CASK=Casks/coresense@dev.rb" >> "$GITHUB_ENV"
          else
            echo "CASK=Casks/coresense.rb" >> "$GITHUB_ENV"
          fi

      - name: Download release DMG
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # The `prereleased` webhook can fire before ci.yml's
          # softprops/action-gh-release finishes uploading the (large) asset set,
          # so poll until the universal DMG appears rather than failing on the
          # first miss. Stable releases publish already-complete, so this is a
          # no-op there (succeeds on attempt 1).
          for attempt in $(seq 1 10); do
            if gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
              --pattern 'CoreSense-*-universal.dmg' --dir dist --clobber; then
              echo "Downloaded universal DMG on attempt ${attempt}."
              exit 0
            fi
            echo "Universal DMG not available yet (attempt ${attempt}/10); waiting 15s…"
            sleep 15
          done
          echo "CoreSense universal DMG never appeared for ${TAG}" >&2
          exit 1

      - name: Update cask
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          shopt -s nullglob
          dmgs=(dist/CoreSense-*-universal.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then echo "No universal DMG found in release $TAG"; exit 1; fi
          node scripts/update-cask.mjs --version "${TAG#v}" --dmg "${dmgs[0]}" --cask "$CASK"

      - name: Commit cask bump
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if git diff --quiet -- "$CASK"; then
            echo "Cask already up to date for $TAG; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "chore: bump homebrew cask to ${TAG} [skip ci]"
          git push origin HEAD:main
