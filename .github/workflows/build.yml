name: Build

on:
  push:
    branches: [main] # nightly → artifacts only
    tags: ['v*.*.*'] # release → draft GitHub release (Task 4)
  workflow_dispatch: # manual

permissions:
  contents: write # create releases / upload assets

concurrency:
  group: build-${{ github.ref }}
  # never cancel an in-flight tag/release build; do cancel superseded main builds
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  NODE_VERSION: '24.15.0'
  PNPM_VERSION: '11'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm test:integration

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            make: pnpm make:mac
          - os: windows-latest
            platform: win32
            make: pnpm make:win
          - os: ubuntu-latest
            platform: linux
            make: pnpm make
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev rpm fakeroot
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Make
        run: ${{ matrix.make }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coresense-${{ matrix.platform }}
          path: out/make/**
          if-no-files-found: error
